[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/turn/ice-config"
  to = "/.netlify/functions/turn-ice-config"
  status = 200

[[redirects]]
  from = "/api/turn/usage/*"
  to = "/.netlify/functions/turn-usage/:splat"
  status = 200

[[redirects]]
  from = "/api/signal/session"
  to = "/.netlify/functions/signal-session"
  status = 200

[[redirects]]
  from = "/api/signal/state/*"
  to = "/.netlify/functions/signal-state/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
